name: "Vprofile IAC Destroy all"
on: 
  workflow_dispatch: # allow manual dispatch 
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm deletion of all resources'
        required: true
        type: string

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }} # name poorly chosen - should be AWS_SECRET_ACCESS_KEY (without _ID)
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: eu-north-1
  EKS_CLUSTER: gitops-proj-tut-eks # same as in variables.tf

jobs:
  Terraform:
    name: "Destroy terraform setup"
    runs-on: ubuntu-latest # comes with many useful libraries 
    defaults: # in all steps do
      run:
        shell: bash
        working-directory: ./terraform
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
            echo "Error: You must type 'destroy' to confirm resource deletion"
            exit 1
          fi
    
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Setup Terraform on the runner"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.3 # same as in `terraform.tf`

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Terraform init"
        id: tf-init
        # run: terraform init -backend-config="bucket=$BUCKET_TF_STATE" 
        run: terraform init -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" -backend-config="region=${{ env.AWS_REGION }}"

      - name: "Terraform format" # will cause failure on incorrect format
        id: tf-format
        run: terraform fmt -check

      - name: "Terraform validate"
        id: tf-validate
        run: terraform validate

      - name: "Terraform plan"
        id: tf-plan-destroy
        run: terraform plan -no-color -input=false  -destroy -out=destroy.tfplan
        continue-on-error: true # do custom check in next step
        
      - name: "Terraform check plan status - exit on error"
        id: tf-plan-status
        if: steps.tf-plan-destroy.outcome == 'failure'
        run: echo "Terraform plan failed! Check the logs for details"; exit 1

      - name: "Get Kube config file"
        id: getconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }} 

      - name: "Uninstall Ingress controller"
        id: destroy-ingress-controller
        # if: steps.getconfig.outcome == 'success'
        run: kubectl delete -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.1.3/deploy/static/provider/aws/deploy.yaml

      - name: Terraform Destroy
        # if: steps.destroy-ingress-controller.outcome == 'success'
        run: terraform apply -auto-approve -input=false -parallelism=1 destroy.tfplan

