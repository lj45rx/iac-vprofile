
name: Terraform Destroy (TODO delete)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm deletion of all resources'
        required: true
        type: string

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Validate confirmation
      run: |
        if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
          echo "Error: You must type 'destroy' to confirm resource deletion"
          exit 1
        fi
    
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Terraform Init
      run: terraform init
    
    - name: Terraform Plan Destroy
      run: terraform plan -destroy -out=destroy.tfplan
    
    - name: Terraform Destroy
      run: terraform apply destroy.tfplan
    
    - name: Clean up state files
      run: |
        rm -f terraform.tfstate*
        rm -f destroy.tfplan
        rm -rf .terraform/