name: "Vprofile IAC"
on: 
  push:
    branches: 
      - main
      - stage
    paths: # only if there are changes in this folder
      - terraform/**

  pull_request:
    branches: 
      - main
    paths: 
      - terraform/**

  workflow_dispatch: # allow manual dispatch (for testing only)

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: eu-north-1
  EKS_CLUSTER: gitops-proj-tut-eks # same as in variables.tf

jobs:
  Terraform:
    name: "Apply terraform code changes"
    runs-on: ubuntu-latest # comes with many useful libraries 
    defaults: # in all steps do
      run:
        shell: bash
        working-directory: ./terraform
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v5

      - name: "Setup Terraform on the runner"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.3 # same as in `terraform.tf`

      - name: "Terraform init"
        id: tf-init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"
        # run: terraform init -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" -backend-config="region=${{ env.AWS_REGION }}" # untested

      - name: "Terraform format" # will cause failure on incorrect format
        id: tf-format
        run: terraform fmt -check

      - name: "Terraform validate"
        id: tf-validate
        run: terraform validate

      - name: "Terraform plan"
        id: tf-plan
        run: terraform plan -no-color -input=false -out tf-planfile
        continue-on-error: true # do custom check in next step
        
      - name: "Terraform check plan status"
        id: tf-plan-status
        if: steps.tf-plan.outcome == 'failure'
        run: echo "Terraform plan failed! Check the logs for details"; exit 1


      - name: "Terraform apply"
        id: apply
        # only run for push action on main branch
        if: github.ref == 'refs/heads/main' && github.event == 'push'
        # execute based on file created in 'terraform plan', disable parallelism to prevent some problems
        run: terraform apply -auto-approve -input=false -parallelism=1 tf-planfile

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Get Kube config file"
        id: getconfig
        if: steps.apply.outcome == 'success'
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }} 

      - name: "Install Ingress controller"
        if: steps.apply.outcome == 'success' && steps.getconfig.outcome == 'success'
        run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.1.3/deploy/static/provider/aws/deploy.yaml
