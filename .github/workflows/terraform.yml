name: "Vprofile IAC"
on: 
  push:
    branches: 
      - main
      - stage
    paths: # only if there are changes in this folder
      - terraform/**

  pull_request:
    branches: 
      - main
    paths: 
      - terraform/**

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY_ID: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: eu-north-1
  EKS_CLUSTER: gitops-proj-tut-eks # same as in variables.tf

jobs:
  Terraform:
    name: "Apply terraform code changes"
    runs-on: ubuntu-latest # comes with many useful libraries 
    defaults: # in all steps do
      run:
        shell: bash
        working-directory: ./terraform
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v5

      - name: "Setup Terraform on the runner"
        uses: hashicorp/setup-terraform@v2
        # with:
        #  terraform_version: 1.7.3

      - name: "Terraform init"
        id: tf-init
        run: terraform init -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" -backend-config="region=${{ env.AWS_REGION }}"

      - name: "Terraform format" # will cause failure on incorrect format
        id: tf-format
        run: terraform fmt -check

      - name: "Terraform validate"
        id: tf-validate
        run: terraform validate

      - name: "Terraform plan"
        id: tf-plan
        run: terraform plan -no-color -input=false -out tf-planfile
        continue-on-error: true # do custom check in next step
        
      - name: "Terraform check plan status"
        id: tf-plan-status
        if: steps.tf-plan.outcome == 'failure'
        run: echo "Terraform plan failed! Check the logs for details"; exit 1
